<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteogram | Weather Forecast</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Meteogram <span>Forecast</span></h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city (e.g., London, Tokyo)...">
                <button id="searchBtn">Search</button>
            </div>
        </header>

        <main>
            <div class="current-weather" id="currentWeather">
                <p>Search for a city to load weather data...</p>
            </div>

            <div class="chart-container">
                <canvas id="meteogramChart"></canvas>
            </div>
            
            <div class="footer-note">
                <p>Data provided by Open-Meteo | Built for Portfolio</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
